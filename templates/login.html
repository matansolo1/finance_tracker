<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinControl - התחברות</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts (Rubik) -->
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Rubik', system-ui, -apple-system, sans-serif;
            background-color: #0B0F19;
            color: #F3F4F6;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-center items-center px-4">

    <!-- Card Container -->
    <div class="w-full max-w-md bg-[#111827] border border-slate-800 rounded-3xl p-8 shadow-2xl space-y-8 text-center">
        <!-- Logo / Brand -->
        <div class="flex flex-col items-center space-y-3">
            <div class="p-4 bg-emerald-950/40 rounded-2xl border border-emerald-800/30 text-emerald-400">
                <svg class="h-12 w-12 text-emerald-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
            </div>
            <span class="text-4xl font-black tracking-tight text-white bg-gradient-to-r from-emerald-400 to-teal-500 bg-clip-text text-transparent">FinControl</span>
            <span class="text-xs font-semibold bg-emerald-950/50 text-emerald-400 border border-emerald-800/40 px-3 py-1 rounded-full">מערכת ניהול תקציב חכמה ב-SaaS</span>
        </div>

        <!-- Description -->
        <div class="space-y-2">
            <h2 class="text-xl font-bold text-white">ברוכים הבאים ל-FinControl</h2>
            <p class="text-sm text-slate-400">הכנסו לחשבון שלכם בצורה מאובטחת. כל המידע והנתונים שלכם מסונכרנים ישירות ובאופן מבודד לחלוטין בקובץ Excel אישי משלכם.</p>
        </div>

        <!-- Divider -->
        <div class="border-t border-slate-800"></div>

        <!-- Google OAuth Button -->
        <div>
            <a href="/login/google" class="w-full flex items-center justify-center gap-3 bg-white hover:bg-slate-100 text-slate-900 font-bold py-3.5 px-4 rounded-2xl shadow-xl transition duration-200 transform active:scale-95 text-base">
                <!-- Google Icon SVG -->
                <svg class="w-5 h-5" viewBox="0 0 24 24">
                    <path fill="#EA4335" d="M12 5.04c1.66 0 3.2.57 4.38 1.69l3.27-3.27C17.67 1.48 14.97 1 12 1 7.24 1 3.2 3.74 1.25 7.73l3.87 3C6.03 7.6 8.78 5.04 12 5.04z"/>
                    <path fill="#4285F4" d="M23.49 12.27c0-.81-.07-1.59-.2-2.36H12v4.47h6.44c-.28 1.47-1.11 2.71-2.36 3.55l3.66 2.84c2.14-1.97 3.75-4.87 3.75-8.5z"/>
                    <path fill="#FBBC05" d="M5.12 10.73c-.24-.73-.38-1.51-.38-2.33 0-.82.14-1.6.38-2.33L1.25 3.07C.45 4.67 0 6.48 0 8.4c0 1.92.45 3.73 1.25 5.33l3.87-3z"/>
                    <path fill="#34A853" d="M12 23c3.24 0 5.97-1.07 7.96-2.91l-3.66-2.84c-1.01.68-2.31 1.09-4.3 1.09-3.22 0-5.97-2.56-6.88-5.69l-3.87 3C3.2 20.26 7.24 23 12 23z"/>
                </svg>
                <span>התחבר באמצעות גוגל</span>
            </a>
        </div>
    </div>

    <!-- Footer -->
    <footer class="text-xs text-slate-600 mt-12">
        <p>© 2026 FinControl. אבטחה ובידוד נתונים מובטחים בכניסה מאובטחת.</p>
    </footer>

</body>
</html>
